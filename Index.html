<!DOCTYPE html>
<html lang="en">
  <head>
    <base target="_top">
    <!-- Google Fonts for attractive typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        /* Beautiful Saffron and Warm Red Gradient Background */
        background: linear-gradient(135deg, #FF9933 0%, #D84315 100%);
        min-height: 100vh;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        background: white;
        max-width: 450px;
        width: 100%;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.25);
        overflow: hidden;
      }
      .header {
        background: #fff;
        padding: 30px 20px 20px;
        text-align: center;
        border-bottom: 3px solid #FFF3E0;
      }
      .header img {
        width: 70px;
        margin-bottom: 10px;
      }
      .header h1 {
        margin: 0;
        color: #E65100;
        font-size: 26px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .header h3 {
        margin: 5px 0 15px;
        color: #BF360C;
        font-size: 15px;
        font-weight: 600;
      }
      .yatra-tag {
        background: #FFF3E0;
        color: #E65100;
        padding: 8px 18px;
        border-radius: 25px;
        font-size: 14px;
        font-weight: 700;
        display: inline-block;
        border: 1px solid #FFE0B2;
        box-shadow: 0 2px 5px rgba(0,0,0,0.05);
      }
      .form-body {
        padding: 30px 25px;
      }
      .form-group {
        margin-bottom: 22px;
        position: relative;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #424242;
        font-weight: 600;
        font-size: 14px;
      }
      .form-group i {
        position: absolute;
        top: 40px;
        left: 15px;
        color: #FF9800;
        font-size: 18px;
      }
      input, select {
        width: 100%;
        padding: 14px 14px 14px 45px;
        box-sizing: border-box;
        border: 2px solid #EEEEEE;
        border-radius: 10px;
        font-size: 15px;
        font-family: 'Poppins', sans-serif;
        color: #333;
        transition: all 0.3s ease;
        background-color: #FAFAFA;
      }
      input:focus, select:focus {
        border-color: #FFB74D;
        background-color: #FFFFFF;
        outline: none;
        box-shadow: 0 0 0 4px rgba(255, 152, 0, 0.1);
      }
      button {
        width: 100%;
        padding: 16px;
        background: linear-gradient(to right, #FF9800, #F57C00);
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        box-shadow: 0 4px 15px rgba(245, 124, 0, 0.3);
        margin-top: 10px;
      }
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(245, 124, 0, 0.4);
        background: linear-gradient(to right, #F57C00, #E65100);
      }
      button:disabled {
        background: #E0E0E0;
        color: #9E9E9E;
        box-shadow: none;
        transform: none;
        cursor: not-allowed;
      }
      #message {
        margin-top: 20px;
        text-align: center;
        font-weight: 600;
        font-size: 15px;
        min-height: 22px;
      }
      .footer {
        background: #FAFAFA;
        padding: 20px 25px;
        text-align: center;
        border-top: 1px solid #EEEEEE;
      }
      .footer p {
        margin: 4px 0;
        color: #616161;
        font-size: 12px;
        line-height: 1.6;
      }
      .footer .temple-name {
        font-weight: 700;
        color: #E65100;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .footer .address {
        font-weight: 500;
      }
      .contact-info {
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px dashed #E0E0E0;
      }
      .contact-info a {
        color: #E65100;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>

        <h1>ISKCON Ratlam</h1>
        <h3>Sri Sri Radha Vrindavan Chandra Temple</h3>
        <div class="yatra-tag">🙏 Jagannath Rath Yatra Volunteer</div>
      </div>
      
      <!-- FORM SECTION -->
      <div class="form-body">
        <form id="volunteerForm" onsubmit="handleFormSubmit(event)">
          
          <div class="form-group">
            <label for="name">Full Name</label>
            <i class="fa-solid fa-user"></i>
            <input type="text" id="name" name="name" required placeholder="Enter your full name">
          </div>
          
          <div class="form-group">
            <label for="mobile">Mobile Number</label>
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="mobile" name="mobile" required pattern="[0-9]{10}" placeholder="10-digit mobile number">
          </div>
          
          <div class="form-group">
            <label for="service">Select Service Area</label>
            <i class="fa-solid fa-hands-holding-circle"></i>
            <select id="service" name="service" required>
              <option value="" disabled selected>Choose your service...</option>
              <option value="Food Distribution">🍛 Food Distribution (Prasadam)</option>
              <option value="Crowd Management">🚧 Crowd Management</option>
              <option value="Harinam">📿 Harinam</option>
              <option value="Kirtan">🎶 Kirtan</option>
            </select>
          </div>
          
          <button type="submit" id="submitBtn">Register Now</button>
        </form>
        
        <div id="message"></div>
      </div>

      <!-- FOOTER SECTION -->
      <div class="footer">
        <p class="temple-name">ISKCON Ratlam</p>
        <p class="address">📍 269, Khachrod Nagda Road, Pratap Nagar<br>In Front Of Power Grid, Ratlam<br>Madhya Pradesh, India</p>
        <div class="contact-info">
          <p><i class="fa-solid fa-phone" style="font-size:10px;"></i> <a href="tel:+917828106610">+91 78281 06610</a></p>
          <p><i class="fa-solid fa-envelope" style="font-size:10px;"></i> <a href="mailto:info@iskconratlam.org">info@iskconratlam.org</a></p>
        </div>
      </div>

    </div>

    <script>
      function handleFormSubmit(event) {
        event.preventDefault(); 
        
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
        msg.innerText = '';

        const formObject = document.getElementById('volunteerForm');
        
        google.script.run
          .withSuccessHandler(function(response) {
            document.getElementById('volunteerForm').reset();
            btn.disabled = false;
            btn.innerHTML = 'Register Now';
            msg.style.color = '#2E7D32'; // Success Green
            msg.innerText = 'Hare Krishna! Registration successful.';
          })
          .withFailureHandler(function(error) {
            btn.disabled = false;
            btn.innerHTML = 'Register Now';
            msg.style.color = '#D32F2F'; // Error Red
            msg.innerText = 'Something went wrong. Please try again.';
          })
          .processForm(formObject);
      }
    </script>
